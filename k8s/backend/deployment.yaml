apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: backend-api

    spec:
      containers:
        - name: backend

          # ✅ IMPORTANT: replace latest with your real build tag
          image: 090565618799.dkr.ecr.us-east-1.amazonaws.com/lms-backend:d0f0f54

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          env:
            - name: PORT
              value: "5000"

            # ✅ Stripe secret injected correctly
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_SECRET_KEY