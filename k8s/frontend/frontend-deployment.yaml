apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-frontend
  template:
    metadata:
      labels:
        app: lms-frontend
    spec:
      containers:
      - name: frontend
        image: 090565618799.dkr.ecr.us-east-1.amazonaws.com/lms-frontend:latest
        ports:
        - containerPort: 3000